<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex Crew</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
    <header>
        <div class="container">
            <a href="#"><strong>Ex Crew</strong></a>
            
            <nav>
                
                <a href="#">Home</a>
                <a href="#">Works</a>
                <a href="#">Contact</a>
            </nav>
        </div>
    </header>

    <main>

        <section class="banner-container">
            <div class="container">
                <div class="left-section">
                    <h1>Welcome to Ex Crew</h1>
                    <p>is an graphics designing team. <br> Which provides quaility Gfx & Vfx items. <br>
                        Join Discord for more information</p>

                    <a href="https://discord.gg/gmcXC4FF"><button>Join</button></a>
                </div>

                <div class="right-section">
                    <h4>Fill the form to order</h4>

                    <form action="" autocomplete="off">
                        <div class="input-group">
                            <input type="text" id="name" required>
                            <label for="name">Name</label>
                        </div>
                        <div class="input-group">
                            <input type="email" id="email" required>
                            <label for="email">Email</label>
                        </div>
                        <div class="input-group">
                            <input type="text" id="order" required>
                            <label for="order">Order</label>
                        </div>
                        <div class="submit-section">
                            <input type="submit" class="submit-button">
                        </div>
                    </form>
                </div>
            </div>
        </section>
        <h1 class="work"> Our Recent Works</h1>


        <section class="section-two">
                <div class="card-container">            
                <div class="image-container">
                    <img src="works/Jersey_01.jpg" alt="">
                </div> 
            </div>
            <div class="card-container">
                <div class="image-container">
                    <img src="works/Jersey_02.jpg" alt="">
                </div>             
            </div>
            <div class="card-container">
                <div class="image-container">
                    <img src="works/Jersey_03.jpg" alt="">
                </div>                
            </div>
            
        </section>

    </main>

</body>
</html>
